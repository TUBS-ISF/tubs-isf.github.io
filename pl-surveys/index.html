<!DOCTYPE html>
<!--
  Literature Survey Table - Interactive Filter Interface
  
  This page displays a collection of literature surveys on Software Product Line Research made 
  from Rahel Sundermann with interactive multi-select dropdown filters for dynamic data exploration.
  
  @author Lennart Pape
  @author Rahel Sundermann
  @date 2026-03-26
  @version 2.1.0
-->
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Tertiary Study PLA</title>
  
  <!-- CSS Styles -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap">
  <link rel="stylesheet" href="../css/vendor/bootstrap.min.css">
  <link rel="stylesheet" href="../css/vendor/dataTables.bootstrap5.min.css">  
  <link rel="stylesheet" href="../css/styles.css">

</head>
<body>
  <header class="d-flex align-items-center justify-content-between" style="flex-wrap: wrap;">
    <div style="flex: 1; min-width: 0;">
        <h1>Institute of Software Engineering and Automotive Informatics</h1>  
    </div>  
    <a href="/">
        <img src="../img/logo_ISF.svg" alt="ISF Logo" class="logo" style="height: 70px;">
    </a>
  </header>
  <main>
    <h2>A Collection of Literature Surveys on Software Product Line Research</h2>

    <div class="container-fluid">
    
        <!-- Active Filters Display -->
        <div class="active-filters">
            <strong>Active Filters:</strong>
            <div id="active-filters-container" class="d-inline">
                <span class="text-muted">No filters applied</span>
            </div>
            <button id="clear-all-filters" class="clear-all-btn" style="display: none;">Clear All</button>
        </div>
        
        <!-- Display Table-->
        <table id="csvTable" class="table table-striped table-bordered" style="width:100%">
            <thead></thead>
        </table>
    </div>
  </main>

  <!-- JS Libraries and Script-->
  <script src="../js/vendor/jquery.min.js"></script>
  <script src="../js/vendor/dataTables.min.js"></script>
  <script src="../js/vendor/dataTables.bootstrap5.min.js"></script>
  <script src="../js/vendor/papaparse.min.js"></script>
  <script src="../js/script.js"></script>
</body>
</html>
